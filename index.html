<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Calculator</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Sum Calculator</h3>

        <input type="number" id="num1" class="form-control mb-2" placeholder="Enter first number">
        <input type="number" id="num2" class="form-control mb-3" placeholder="Enter second number">

        <button class="btn btn-primary w-100" onclick="calculateSum()">Calculate Sum</button>

        <h5 class="text-center mt-3" id="result"></h5>
    </div>

    <script>
        function calculateSum() {
            let n1 = document.getElementById("num1").value;
            let n2 = document.getElementById("num2").value;

            let sum = Number(n1) + Number(n2);

            document.getElementById("result").innerText = "Result: " + sum;
        }
    </script>
    <!-- comment -->

</body>

</html>
